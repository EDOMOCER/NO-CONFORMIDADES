<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#E7E9EC; --panel:#FFFFFF; --panel-2:#F3F4F6;
    --ink:#161A20; --ink-soft:#5A626E; --line:#D6DADF;
    --brand:#E2620A; --brand-deep:#B84D05;
    --danger:#C0231F; --steel:#2F4A6B;
    --ok:#1E7A4D; --ok-bg:#E3F2E9; --warn-bg:#FCF1E2;
    --disp:'Barlow Condensed',sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .tape{height:7px;background:repeating-linear-gradient(45deg,#161A20 0 14px,#E2620A 14px 28px)}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px 60px}

  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;padding:22px 0 14px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand-logo{max-height:54px;max-width:170px;border-radius:6px;display:block}
  .company{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.09em;font-size:14px;color:var(--brand-deep);margin-bottom:2px}
  .logoprev{width:150px;height:66px;border:1px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--panel-2);overflow:hidden}
  .logoprev img{max-width:100%;max-height:100%}
  .brand h1{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:30px;line-height:1;margin:0}
  .brand p{margin:6px 0 0;color:var(--ink-soft);font-size:12.5px}
  .right{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
  .yearpick{display:flex;flex-direction:column;gap:4px}
  .yearpick label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600}
  .yearpick select{font-family:var(--disp);font-weight:700;font-size:20px;padding:4px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel)}
  .kpis{display:flex;gap:10px;flex-wrap:wrap}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 14px;min-width:72px}
  .kpi .n{font-family:var(--disp);font-weight:700;font-size:24px;line-height:1}

<script>
/* ======================================================================
   CONFIGURACIÓN DE LA BASE DE DATOS  (Supabase)
   Pega aquí los dos datos de tu proyecto de Supabase, entre las comillas.
   Los encuentras en Supabase → Project Settings → API
   ====================================================================== */
const SUPABASE_URL = "https://lsmvpnobaxvkxmzbntwn.supabase.co";          // ej. https://xxxxxxxx.supabase.co
const SUPABASE_ANON_KEY = "sb_publishable_SwxCjzPQJj1TKEd6ZPOtBA_3pxw-JIP";   // la clave "anon public"
/* ====================================================================== */

const MOTIVOS = ["Cantidad incorrecta","Artículo equivocado","Pieza defectuosa / dañada","Error de embalaje","Error de etiquetado","Medida fuera de tolerancia","Documentación incorrecta","Entrega fuera de plazo","Otro"];
const K = {reg:"registros", cat:"catalogo", req:"solicitudes"};
const TABLA = "nc_state";

let sb = null;
let registros = [];
let delreqs = [];
let catalog = defaultCatalog();
let persistente = false;
let isAdmin = false;
let activeTab = "registrar";
let yearFilter = new Date().getFullYear();
let filtros = {q:"", trab:"", dep:""};
let trabSel = "";
let lastSig = "";
let logoBuffer; // undefined = sin cambios; string = nuevo logo; null = quitar

function defaultCatalog(){ return {departments:[], workers:[], years:[], adminPin:null, company:"", logo:null}; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
const view = () => document.getElementById("view");

/* ---------- almacenamiento (base de datos compartida) ---------- */
function configurado(){ return SUPABASE_URL && SUPABASE_ANON_KEY && !SUPABASE_URL.includes("PEGA_AQUI") && !SUPABASE_ANON_KEY.includes("PEGA_AQUI"); }
async function readKey(key){
  if(!sb) return null;
  try{ const {data,error}=await sb.from(TABLA).select("value").eq("key",key).maybeSingle(); if(error) throw error; return data?data.value:null; }
  catch(e){ console.error("Lectura:",e.message||e); return null; }
}
async function writeKey(key,val){
  if(!sb) return;
  try{ const {error}=await sb.from(TABLA).upsert({key,value:val},{onConflict:"key"}); if(error) throw error; }
  catch(e){ console.error("No se pudo guardar:",e.message||e); alert("No se pudieron guardar los cambios en la base de datos. Revisa tu conexión a internet."); }
}
async function commitReg(mut){ const l=(await readKey(K.reg))||[]; registros=mut(l.slice()); await writeKey(K.reg,registros); }
async function commitReq(mut){ const l=(await readKey(K.req))||[]; delreqs=mut(l.slice()); await writeKey(K.req,delreqs); }
async function commitCat(mut){ const l=Object.assign(defaultCatalog(),(await readKey(K.cat))||{}); catalog=mut(l); await writeKey(K.cat,catalog); }

async function probarConexion(){
  try{ const {error}=await sb.from(TABLA).select("key").limit(1); if(error) throw error; return {ok:true}; }
  catch(e){ return {ok:false, error:(e.message||String(e))}; }
}

async function loadAll(){
  registros=(await readKey(K.reg))||[];
  delreqs=(await readKey(K.req))||[];
  catalog=Object.assign(defaultCatalog(),(await readKey(K.cat))||{});
  document.getElementById("storenote").textContent =
    "Datos compartidos en la base de datos: todo lo que se registra aquí es visible para cualquier persona de la empresa que abra el enlace, y se actualiza solo cada pocos segundos sin recargar la página.";
  lastSig = sigFrom(JSON.stringify(registros), JSON.stringify(delreqs), JSON.stringify(catalog));
}

function renderConfigHelp(msg){
  document.getElementById("storenote").textContent="";
  view().innerHTML=`<div class="panel"><div class="lock" style="max-width:560px">
    <div class="ic">🔌</div>
    <h2 class="sec" style="justify-content:center">Conecta la base de datos</h2>
    <p class="hint" style="margin-bottom:10px">${esc(msg)}</p>
    <p class="hint">Sigue la guía paso a paso que te he dado en el chat: crea el proyecto gratuito en Supabase, ejecuta el bloque de instalación, copia tu <b>URL</b> y tu <b>clave anon public</b>, y pégalas arriba del todo del archivo (en la sección «CONFIGURACIÓN DE LA BASE DE DATOS»). Después vuelve a subir el archivo a Netlify.</p>
  </div></div>`;
}

/* ---------- utilidades ---------- */
function hoyISO(){ return new Date().toISOString().split("T")[0]; }
function fmtFecha(iso){ if(!iso) return ""; const [a,m,d]=iso.split("-"); return `${d}/${m}/${a}`; }
function yearOf(iso){ return Number((iso||"").slice(0,4)); }
function folioStr(n){ return "NC-"+String(n||0).padStart(4,"0"); }
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function depName(id){ const d=catalog.departments.find(x=>x.id===id); return d?d.nombre:""; }
function workersOfDep(id){ return catalog.workers.filter(w=>w.depId===id).sort((a,b)=>a.nombre.localeCompare(b.nombre,"es")); }
function pendientes(){ return delreqs.filter(r=>r.estado==="pendiente"); }

function allYears(){
  const ys=new Set(catalog.years||[]);
  registros.forEach(r=>{ const y=yearOf(r.fecha); if(y) ys.add(y); });
  ys.add(new Date().getFullYear());
  return [...ys].sort((a,b)=>b-a);
}
function regsAnio(){ return yearFilter==="all" ? registros : registros.filter(r=>yearOf(r.fecha)===yearFilter); }

/* ---------- cabecera ---------- */
function renderYearSel(){
  const ys=allYears();
  const sel=document.getElementById("yearSel");
  sel.innerHTML = ys.map(y=>`<option value="${y}" ${y===yearFilter?"selected":""}>${y}</option>`).join("")
    + `<option value="all" ${yearFilter==="all"?"selected":""}>Todos</option>`;
}
function renderBrand(){
  const logo=document.getElementById("brandLogo"), comp=document.getElementById("brandCompany");
  if(catalog.logo){ logo.src=catalog.logo; logo.hidden=false; } else { logo.hidden=true; logo.removeAttribute("src"); }
  if(catalog.company){ comp.textContent=catalog.company; comp.hidden=false; document.title=catalog.company+" · No Conformidades"; }
  else { comp.hidden=true; document.title="Control de No Conformidades"; }
  const ic=document.getElementById("appIcon"); // icono de pantalla de inicio = logo de la empresa si lo hay
  if(ic && catalog.logo) ic.href=catalog.logo;
}
function renderKpis(){
  const rs=regsAnio();
  const trabs=new Set(rs.map(r=>r.trabajador)).size;
  const deps=new Set(rs.map(r=>r.departamento)).size;
  const uds=rs.reduce((s,r)=>s+(Number(r.cantidad)||0),0);
  document.getElementById("kpis").innerHTML=`
    <div class="kpi"><div class="n">${rs.length}</div><div class="l">No conf.</div></div>
    <div class="kpi"><div class="n">${uds}</div><div class="l">Uds. afect.</div></div>
    <div class="kpi"><div class="n">${trabs}</div><div class="l">Trabajadores</div></div>
    <div class="kpi"><div class="n">${deps}</div><div class="l">Departam.</div></div>`;
}
function renderBanner(){
  const n=pendientes().length;
  const b=document.getElementById("banner");
  if(!n){ b.innerHTML=""; return; }
  b.innerHTML=`<div class="alert"><b>${n} solicitud${n>1?"es":""} de baja pendiente${n>1?"s":""}</b>
    de revisión por el responsable.
    <button class="btn ghost small" id="goReq">Revisar</button></div>`;
  document.getElementById("goReq").onclick=()=>switchTab("admin");
  const badge=document.getElementById("admBadge");
  badge.textContent=n; badge.classList.add("show");
}

/* ---------- navegación / render ---------- */
function switchTab(t){
  activeTab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  render();
}
function render(){
  renderYearSel(); renderBrand(); renderKpis();
  const badge=document.getElementById("admBadge"), n=pendientes().length;
  badge.textContent=n; badge.classList.toggle("show",n>0);
  renderBanner();
  if(activeTab==="registrar") renderRegistrar();
  else if(activeTab==="registro") renderRegistro();
  else if(activeTab==="trabajador") renderTrabajador();
  else if(activeTab==="departamentos") renderDepartamentos();
  else if(activeTab==="comparativa") renderComparativa();
  else renderAdmin();
  lastSig = sigFrom(JSON.stringify(registros), JSON.stringify(delreqs), JSON.stringify(catalog));
}
async function refrescar(){ await loadAll(); render(); }
function refreshBtn(){ return `<span class="live"><span class="dot"></span>En vivo</span>`; }
function bindRefresh(){ /* actualización automática: ya no hace falta enlazar nada */ }

/* ---------- REGISTRAR ---------- */
function renderRegistrar(){
  if(!catalog.departments.length){
    view().innerHTML=`<div class="panel"><div class="empty"><strong>Falta configurar la app</strong>
      Todavía no hay departamentos ni trabajadores dados de alta. El responsable debe crearlos en la pestaña «Administración».</div></div>`;
    return;
  }
  view().innerHTML=`
  <div class="panel">
    <h2 class="sec">Nueva no conformidad ${refreshBtn()}</h2>
    <div class="grid">
      <div class="field">
        <label for="f-dep">Zona / departamento</label>
        <select id="f-dep"><option value="">— Selecciona —</option>
          ${catalog.departments.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,"es")).map(d=>`<option value="${d.id}">${esc(d.nombre)}</option>`).join("")}</select>
      </div>
      <div class="field">
        <label for="f-trab">Trabajador</label>
        <select id="f-trab" disabled><option value="">Selecciona primero un departamento</option></select>
      </div>
      <div class="field"><label for="f-ped">Pedido</label><input id="f-ped" class="mono" placeholder="Nº de pedido" autocomplete="off"></div>
      <div class="field"><label for="f-cod">Código de artículo</label><input id="f-cod" class="mono" placeholder="Código / referencia" autocomplete="off"></div>
      <div class="field"><label for="f-cant">Cantidad afectada</label><input id="f-cant" type="number" min="0" step="1" placeholder="0"></div>
      <div class="field"><label for="f-fecha">Fecha</label><input id="f-fecha" type="date"></div>
      <div class="field full"><label for="f-mot">Motivo de la no conformidad</label>
        <select id="f-mot">${MOTIVOS.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div class="field full"><label for="f-det">Detalle (opcional)</label>
        <textarea id="f-det" placeholder="Descripción de lo ocurrido, observaciones…"></textarea></div>
    </div>

  bindRefresh();

async function addRegistro(){
  const depId=document.getElementById("f-dep").value;
  const wId=document.getElementById("f-trab").value;
  const ped=document.getElementById("f-ped").value.trim();
  if(!depId||!wId||!ped){ alert("Indica el departamento, el trabajador y el pedido."); return; }
  const w=catalog.workers.find(x=>x.id===wId);
  const rec={
    id:uid(),
    trabajador: w?w.nombre:"", workerId:wId,
    departamento: depName(depId), depId,
    pedido: ped,
    codigo: document.getElementById("f-cod").value.trim(),
    cantidad: Number(document.getElementById("f-cant").value)||0,
    motivo: document.getElementById("f-mot").value,
    detalle: document.getElementById("f-det").value.trim(),
    fecha: document.getElementById("f-fecha").value||hoyISO(),
    createdAt: Date.now()
  };
  await commitReg(list=>{ const folio=list.reduce((m,r)=>Math.max(m,r.folio||0),0)+1; list.push({...rec,folio}); return list; });

function filtrados(){
  const q=filtros.q.toLowerCase();
  return regsAnio()
    .filter(r=>!filtros.trab||r.trabajador===filtros.trab)
    .filter(r=>!filtros.dep||r.departamento===filtros.dep)
    .filter(r=>{ if(!q) return true; return [r.pedido,r.codigo,r.motivo,r.detalle,r.trabajador,r.departamento].some(v=>String(v||"").toLowerCase().includes(q)); })
    .sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||"")||(b.folio-a.folio));
}
function drawTable(){
  const rows=filtrados(), box=document.getElementById("tbl");

/* ---------- COMPARATIVA ENTRE AÑOS ---------- */
function topEntry(obj){ const e=Object.entries(obj).sort((a,b)=>b[1]-a[1]); return e.length?e[0]:["—",0]; }
function renderComparativa(){
  const byYear={};
  registros.forEach(r=>{ const y=yearOf(r.fecha); if(!y) return;
    const o=byYear[y]||(byYear[y]={nc:0,uds:0,dep:{},mot:{}});
    o.nc++; o.uds+=Number(r.cantidad)||0;
    o.dep[r.departamento]=(o.dep[r.departamento]||0)+1;
    o.mot[r.motivo]=(o.mot[r.motivo]||0)+1; });
  const years=Object.keys(byYear).map(Number).sort((a,b)=>a-b);
  if(years.length<1){
    view().innerHTML=`<div class="panel"><div class="empty"><strong>Aún no hay datos para comparar</strong>Registra no conformidades en uno o más años para ver la evolución.</div></div>`; return;
  }
  const maxNc=Math.max(...years.map(y=>byYear[y].nc));
  const desc=years.slice().reverse();
  const totNc=years.reduce((s,y)=>s+byYear[y].nc,0);
  const peor=years.slice().sort((a,b)=>byYear[b].nc-byYear[a].nc)[0];

  const filas=desc.map(y=>{
    const o=byYear[y], prev=byYear[y-1];
    let varTxt="—", varColor="var(--ink-soft)";
    if(prev){ const d=o.nc-prev.nc; const pct=prev.nc?Math.round(d/prev.nc*100):100;
      const up=d>0; varColor=up?"var(--danger)":(d<0?"var(--ok)":"var(--ink-soft)");
      varTxt=`${up?"▲":(d<0?"▼":"=")} ${d>0?"+":""}${d} (${pct>0?"+":""}${pct}%)`; }
    return `<tr>
      <td><b>${y}</b></td>
      <td class="qty">${o.nc}</td>
      <td class="qty">${o.uds}</td>
      <td style="color:${varColor};font-family:var(--mono);font-size:12.5px;white-space:nowrap">${varTxt}</td>
      <td>${esc(topEntry(o.dep)[0])} <span class="hint">(${topEntry(o.dep)[1]})</span></td>
      <td>${esc(topEntry(o.mot)[0])} <span class="hint">(${topEntry(o.mot)[1]})</span></td>
    </tr>`;
  }).join("");

  view().innerHTML=`
  <div class="panel">
    <h2 class="sec">No conformidades por año ${refreshBtn()}<button class="btn ghost small" id="imp" style="margin-left:auto">Imprimir / PDF</button></h2>
    ${desc.map(y=>`<div class="bar-row ${y===peor?'lead':''}"><div class="name">${y}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(byYear[y].nc/maxNc*100)}%"></div></div>
      <div class="bar-val">${byYear[y].nc} <small>· ${byYear[y].uds} uds</small></div></div>`).join("")}
    <div class="hint" style="margin-top:14px">El año con más no conformidades fue <strong>${peor}</strong> con ${byYear[peor].nc}.
      Total acumulado en ${years.length} año${years.length>1?"s":""}: ${totNc}.</div>
  </div>
  <div class="panel">
    <h2 class="sec">Resumen comparativo</h2>
    <table><thead><tr><th>Año</th><th>Nº NC</th><th>Uds. afect.</th><th>Variación vs año anterior</th><th>Departamento con más NC</th><th>Motivo más frecuente</th></tr></thead>
      <tbody>${filas}</tbody></table>
    <div class="hint" style="margin-top:12px">La variación compara cada año con el inmediatamente anterior. En rojo subidas, en verde bajadas. Esta vista usa todo el histórico, no el año seleccionado arriba.</div>
  </div>`;
  bindRefresh();
  document.getElementById("imp").onclick=()=>imprimir("Comparativa de no conformidades entre años", "Histórico completo");
}

async function sha(s){
  const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

  <div class="panel">
    <h2 class="sec">Años</h2>
    <p class="hint">Las no conformidades se agrupan por el año de su fecha. «Abrir año nuevo» añade el año a los selectores para empezar a registrar en él.</p>
    <div class="toolbar" style="margin-top:12px">
      <div><div class="hint" style="margin-bottom:6px">Años disponibles</div>
        <div>${ys.map(y=>`<span class="tag" style="margin-right:6px">${y}</span>`).join("")}</div></div>
      <button class="btn primary small" id="newyear" style="margin-left:auto">Abrir año nuevo (${nextY})</button>
    </div>
  </div>`;
  bindRefresh();
  document.getElementById("lock").onclick=()=>{ isAdmin=false; render(); };
  logoBuffer=undefined;
  document.getElementById("clogo").onchange=e=>handleLogoFile(e.target.files&&e.target.files[0]);
  document.getElementById("logoDel").onclick=()=>{ logoBuffer=null;
    document.getElementById("logoPrev").innerHTML=`<span class="hint">Sin logo</span>`;
    document.getElementById("logoDel").disabled=true; };
  document.getElementById("csave").onclick=async()=>{
    const name=document.getElementById("cname").value.trim();
    await commitCat(c=>{ c.company=name; if(logoBuffer!==undefined) c.logo=logoBuffer; return c; });
    logoBuffer=undefined; render();
  };
  document.getElementById("adddep").onclick=addDep;
  document.getElementById("addw").onclick=addWorker;
  document.getElementById("newyear").onclick=()=>abrirAnio(nextY);
  view().querySelectorAll("[data-appr]").forEach(b=>b.onclick=()=>aprobarBaja(b.dataset.appr));
  view().querySelectorAll("[data-rej]").forEach(b=>b.onclick=()=>rechazarBaja(b.dataset.rej));
  drawDepList(); drawWorkerList();
}
function reqCard(r){
  const done=r.estado!=="pendiente";
  const estadoTxt=r.estado==="aprobada"?"Aprobada · eliminada":r.estado==="rechazada"?"Rechazada":"Pendiente";
  return `<div class="reqcard ${done?"done":""}">
    <div class="top"><div><span class="folio">${folioStr(r.folio)}</span> · ${esc(r.resumen||"")}</div>
      <span class="pill pend">${estadoTxt}</span></div>
    <div class="meta">Solicitada por <b>${esc(r.solicitadoPor)}</b> el ${fmtFecha(r.fecha)}${r.nota?` · Nota: ${esc(r.nota)}`:""}</div>
    <div class="razon">${esc(r.razon)}</div>
    ${done?"":`<div class="btns"><button class="btn ok small" data-appr="${r.id}">Aprobar y eliminar</button>
      <button class="btn dng small" data-rej="${r.id}">Rechazar</button></div>`}
  </div>`;
}
async function aprobarBaja(reqId){
  const req=delreqs.find(r=>r.id===reqId); if(!req) return;
  if(!confirm(`Aprobar la baja de ${folioStr(req.folio)} (${req.resumen})? Se eliminará definitivamente.`)) return;
  await commitReg(list=>list.filter(r=>r.id!==req.ncId));
  await commitReq(list=>list.map(r=>r.id===reqId?{...r,estado:"aprobada",resueltoAt:Date.now()}:r));
  render();
}
function rechazarBaja(reqId){
  openModal({
    title:"Rechazar solicitud",
    intro:"La no conformidad se mantiene. Puedes dejar una nota para el solicitante.",
    fields:[{key:"nota",label:"Nota (opcional)",type:"textarea",placeholder:"Motivo del rechazo"}],
    confirmText:"Rechazar solicitud",
    onConfirm:async v=>{ await commitReq(list=>list.map(r=>r.id===reqId?{...r,estado:"rechazada",nota:v.nota.trim(),resueltoAt:Date.now()}:r)); render(); }
  });
}
async function adminEliminar(ncId){
  const r=registros.find(x=>x.id===ncId); if(!r) return;
  if(!confirm(`Eliminar ${folioStr(r.folio)} (${r.trabajador} · ${r.pedido})? No se puede deshacer.`)) return;
  await commitReg(list=>list.filter(x=>x.id!==ncId));
  await commitReq(list=>list.map(x=>x.ncId===ncId&&x.estado==="pendiente"?{...x,estado:"aprobada",resueltoAt:Date.now()}:x));
  render();
}
async function addDep(){
  const inp=document.getElementById("nd"), name=inp.value.trim();
  if(!name) return;
  if(catalog.departments.some(d=>d.nombre.toLowerCase()===name.toLowerCase())){ alert("Ese departamento ya existe."); return; }
  await commitCat(c=>{ c.departments.push({id:uid(),nombre:name}); return c; });
  render();
}
async function addWorker(){
  const name=document.getElementById("nw").value.trim(), depId=document.getElementById("nwd").value;
  if(!name||!depId){ alert("Indica el nombre y el departamento del trabajador."); return; }
  await commitCat(c=>{ c.workers.push({id:uid(),nombre:name,depId}); return c; });
  render();
}
async function abrirAnio(y){
  await commitCat(c=>{ c.years=[...new Set([...(c.years||[]),y])]; return c; });
  yearFilter=y; render();
}
function drawDepList(){
  const box=document.getElementById("deplist");
  if(!catalog.departments.length){ box.innerHTML=`<div class="hint">Aún no hay departamentos.</div>`; return; }
  box.innerHTML=catalog.departments.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,"es")).map(d=>{
    const nw=workersOfDep(d.id).length;
    return `<div class="row-item"><div><b>${esc(d.nombre)}</b> <span class="hint">· ${nw} trabajador${nw!==1?"es":""}</span></div>
      <button class="xbtn" data-deldep="${d.id}">Eliminar</button></div>`;
  }).join("");
  box.querySelectorAll("[data-deldep]").forEach(b=>b.onclick=()=>delDep(b.dataset.deldep));
}
async function delDep(id){
  const d=catalog.departments.find(x=>x.id===id); const nw=workersOfDep(id).length;
  if(nw && !confirm(`«${d.nombre}» tiene ${nw} trabajador(es) asignado(s), que también se quitarán de la lista. Las no conformidades ya registradas se conservan. ¿Continuar?`)) return;
  if(!nw && !confirm(`¿Eliminar el departamento «${d.nombre}»?`)) return;
  await commitCat(c=>{ c.departments=c.departments.filter(x=>x.id!==id); c.workers=c.workers.filter(w=>w.depId!==id); return c; });
  render();
}
function drawWorkerList(){
  const box=document.getElementById("wlist");
  if(!catalog.workers.length){ box.innerHTML=`<div class="hint">Aún no hay trabajadores.</div>`; return; }
  const deps=catalog.departments.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,"es"));
  box.innerHTML=deps.map(d=>{
    const ws=workersOfDep(d.id); if(!ws.length) return "";
    return `<div class="depgroup"><h4>${esc(d.nombre)} <span class="hint">${ws.length}</span></h4>
      ${ws.map(w=>`<div class="row-item"><span>${esc(w.nombre)}</span><button class="xbtn" data-delw="${w.id}">Quitar</button></div>`).join("")}</div>`;
  }).join("");
  box.querySelectorAll("[data-delw]").forEach(b=>b.onclick=()=>delWorker(b.dataset.delw));
}
async function delWorker(id){
  const w=catalog.workers.find(x=>x.id===id);
  if(!confirm(`¿Quitar a «${w.nombre}» de la lista? Sus no conformidades ya registradas se conservan.`)) return;
  await commitCat(c=>{ c.workers=c.workers.filter(x=>x.id!==id); return c; });
  render();
}

/* ---------- logo ---------- */
function handleLogoFile(file){
  if(!file) return;
  if(!file.type || !file.type.startsWith("image/")){ alert("Selecciona un archivo de imagen (PNG o JPG)."); return; }
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=200, scale=Math.min(1, max/Math.max(img.width,img.height));
      const w=Math.max(1,Math.round(img.width*scale)), h=Math.max(1,Math.round(img.height*scale));
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      const data=cv.toDataURL("image/png");
      logoBuffer=data;
      const prev=document.getElementById("logoPrev"); if(prev) prev.innerHTML=`<img src="${data}" alt="logo">`;
      const del=document.getElementById("logoDel"); if(del) del.disabled=false;
    };
    img.onerror=()=>alert("No se ha podido leer la imagen.");
    img.src=reader.result;
  };
  reader.onerror=()=>alert("No se ha podido leer el archivo.");
  reader.readAsDataURL(file);
}

/* ---------- modal ---------- */
function openModal({title,intro,fields,confirmText,onConfirm}){
  const ov=document.getElementById("overlay");
  ov.innerHTML=`<div class="modal"><h3>${esc(title)}</h3>
    ${intro?`<p class="hint">${intro}</p>`:""}
    ${fields.map(f=>`<div class="field"><label for="m-${f.key}">${esc(f.label)}</label>
      ${f.type==="textarea"?`<textarea id="m-${f.key}" placeholder="${esc(f.placeholder||"")}"></textarea>`:`<input id="m-${f.key}" type="text" placeholder="${esc(f.placeholder||"")}">`}</div>`).join("")}
    <p class="hint" id="m-err" style="color:var(--danger)"></p>
    <div class="mactions"><button class="btn ghost" id="m-cancel">Cancelar</button>
      <button class="btn primary" id="m-ok">${esc(confirmText||"Aceptar")}</button></div></div>`;
  const close=()=>ov.innerHTML="";
  document.getElementById("m-cancel").onclick=close;
  ov.onclick=e=>{ if(e.target===ov) close(); };
  document.getElementById("m-ok").onclick=async()=>{
    const v={}; fields.forEach(f=>v[f.key]=document.getElementById("m-"+f.key).value);
    const err=await onConfirm(v);
    if(err){ document.getElementById("m-err").textContent=err; } else close();
  };
}

/* ---------- exportar ---------- */
function exportCSV(data,nombre){
  if(!data||!data.length){ alert("No hay registros para exportar."); return; }
  const cab=["Folio","Fecha","Trabajador","Departamento","Pedido","Codigo","Cantidad","Motivo","Detalle"];
  const q=v=>`"${String(v??"").replace(/"/g,'""')}"`;
  const lineas=data.slice().sort((a,b)=>a.folio-b.folio).map(r=>[folioStr(r.folio),fmtFecha(r.fecha),r.trabajador,r.departamento,r.pedido,r.codigo,r.cantidad,r.motivo,r.detalle].map(q).join(";"));
  const csv="\uFEFF"+[cab.join(";"),...lineas].join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  const pre=catalog.company?catalog.company.replace(/[^\w]+/g,"_").replace(/^_|_$/g,"")+"_":"";
  a.download=pre+(nombre||"no_conformidades")+"_"+(yearFilter==="all"?"todos":yearFilter)+"_"+hoyISO()+".csv";
  a.click(); URL.revokeObjectURL(a.href);
}

/* ---------- actualización automática ---------- */
function sigFrom(rv,qv,cv){ return rv.length+"·"+qv.length+"·"+cv.length+"|"+rv+"¦"+qv+"¦"+cv; }
async function pollOnce(){
  if(!persistente || document.hidden) return;
  try{
    const [r,q,c]=await Promise.all([readKey(K.reg),readKey(K.req),readKey(K.cat)]);
    const reg=r||[], req=q||[], cat=Object.assign(defaultCatalog(), c||{});
    const sig=sigFrom(JSON.stringify(reg),JSON.stringify(req),JSON.stringify(cat));
    if(sig===lastSig) return;
    lastSig=sig;
    registros=reg; delreqs=req; catalog=cat;
    softRender();
  }catch(e){}
}
function softRender(){
  const ae=document.activeElement;
  const sel=document.getElementById("yearSel");
  if(ae!==sel) renderYearSel();
  renderBrand();
  renderKpis();
  const badge=document.getElementById("admBadge"), n=pendientes().length;
  badge.textContent=n; badge.classList.toggle("show",n>0);
  renderBanner();
  // no tocar la vista si hay un diálogo abierto, si están escribiendo en ella, o si es el formulario de registro
  const modalOpen=document.getElementById("overlay").innerHTML.trim()!=="";
  const typing=ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName) && document.getElementById("view").contains(ae);
  if(modalOpen || typing || activeTab==="registrar") return;
  if(activeTab==="registro") renderRegistro();
  else if(activeTab==="trabajador") renderTrabajador();
  else if(activeTab==="departamentos") renderDepartamentos();
  else if(activeTab==="comparativa") renderComparativa();
  else renderAdmin();
}

document.getElementById("tabs").addEventListener("click",e=>{ const b=e.target.closest(".tab"); if(b) switchTab(b.dataset.tab); });
document.getElementById("yearSel").addEventListener("change",e=>{ yearFilter=e.target.value==="all"?"all":Number(e.target.value); render(); });
(async function(){
  if(!configurado()){ renderConfigHelp("Todavía no has pegado la URL y la clave de tu base de datos."); return; }
  if(typeof supabase==="undefined"){ renderConfigHelp("No se ha podido cargar la librería de la base de datos. Comprueba tu conexión a internet y recarga."); return; }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const test = await probarConexion();
  if(!test.ok){ renderConfigHelp("No se pudo conectar con la base de datos ("+test.error+"). Revisa que la URL y la clave sean correctas y que hayas creado la tabla con el bloque de instalación."); return; }
  persistente = true;
  await loadAll(); render();
  setInterval(pollOnce,7000);
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) pollOnce(); });
})();
